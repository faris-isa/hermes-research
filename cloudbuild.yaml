steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/hermes-research/hermes-research:$COMMIT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/hermes-research/hermes-research:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hermes-research'
      - '--image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/hermes-research/hermes-research:$COMMIT_SHA'
      - '--region=asia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'

images:
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/hermes-research/hermes-research:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
